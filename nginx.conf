# Production nginx config for the hosted identity SPA.
# Serves the Vite build with SPA fallback, long-lived immutable asset caching,
# gzip, and a hardened set of security headers.

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

    # Security headers applied to every response.
    # connect-src lists 'self' plus the configured API origin(s) the SPA talks to.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://public-api.auth.maintainerd.local; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Runtime config is regenerated on every container start; never cache it.
    location = /config.js {
        add_header Cache-Control "no-store" always;
    }

    # Fingerprinted build assets are immutable and safe to cache aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback: unknown paths resolve to the app entry point.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
