# OpenSSF Scorecard — automated security health assessment
# Public results: https://scorecard.dev/viewer/?uri=github.com/maintainerd/auth-identity
# Docs: https://github.com/ossf/scorecard-action

name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Weekly scan — Monday 06:00 UTC
    - cron: "0 6 * * 1"

permissions: read-all

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload SARIF results to GitHub Code Scanning
      security-events: write
      # Needed for the OIDC token used by Scorecard to publish results
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          # Publish results so they appear on https://scorecard.dev
          publish_results: true

      - name: Upload Scorecard results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard.sarif
          category: scorecard
