name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Runs every day at 02:00 UTC — catches newly published CVEs even without a push
    - cron: "0 2 * * *"

permissions:
  contents: read
  security-events: write # needed to upload SARIF to Code Scanning

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CodeQL — GitHub-native semantic SAST for JavaScript/TypeScript.
  # No extra secrets; results appear in Security → Code Scanning. No build needed
  # for JS/TS (CodeQL extracts straight from source).
  # ─────────────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # security-extended adds CWE coverage beyond the default query suite
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  # ─────────────────────────────────────────────────────────────────────────────
  # Semgrep — open-source SAST (JS/TS + React + OWASP Top-Ten + secrets rulesets).
  # Requires: SEMGREP_APP_TOKEN secret. Results upload to Code Scanning via SARIF.
  # ─────────────────────────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep CI
        run: |
          semgrep ci \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/xss \
            --config p/jwt \
            --sarif \
            --output semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Ensure SARIF file exists
        if: always()
        run: |
          if [ ! -f semgrep.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' > semgrep.sarif
          fi

      - name: Upload Semgrep results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  # ─────────────────────────────────────────────────────────────────────────────
  # Snyk — dependency vulnerability scanning for npm packages.
  # Requires: SNYK_TOKEN secret (free tier at https://app.snyk.io). Non-blocking
  # so the pipeline stays green before the token is configured; SARIF still uploads.
  # ─────────────────────────────────────────────────────────────────────────────
  snyk:
    name: Snyk
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk (dependency scan)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # Fail only on high/critical; tighten to 'medium' for a stricter posture
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Ensure Snyk SARIF file exists
        if: always()
        run: |
          if [ ! -f snyk.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk","rules":[]}},"results":[]}]}' > snyk.sarif
          fi

      - name: Upload Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk.sarif

  # ─────────────────────────────────────────────────────────────────────────────
  # npm audit — fast, token-free dependency check on production dependencies.
  # ─────────────────────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  # ─────────────────────────────────────────────────────────────────────────────
  # Gitleaks — detect secrets committed anywhere in git history. No secrets needed.
  # ─────────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          # Full depth so Gitleaks can audit every commit, not just the latest snapshot
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          VERSION=$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --no-banner \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Ensure SARIF file exists
        # Gitleaks does not write the report file when zero leaks are found.
        if: always()
        run: |
          [ -f gitleaks.sarif ] || cat <<'EOF' > gitleaks.sarif
          {"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"Gitleaks","rules":[]}},"results":[]}]}
          EOF

      - name: Upload Gitleaks results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
