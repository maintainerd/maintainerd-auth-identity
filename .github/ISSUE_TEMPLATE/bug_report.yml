name: Bug Report
description: Report a bug in the Maintainerd Auth hosted identity UI
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you running?
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      description: Which browser and operating system?
      placeholder: "Chrome 126 / macOS 14"
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: console
    attributes:
      label: Console / network errors
      render: shell
